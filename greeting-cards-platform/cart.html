<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Wishes&Cards</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="logo">Wishes<span style="color: var(--text-dark);">&</span>Cards</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="cards.html">Cards</a>
            <a href="blog.html">Blog</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-icons">
            <a href="#"><i class="fa-regular fa-heart"></i></a>
            <a href="cart.html" style="color: var(--primary-color);">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-count">0</span>
            </a>
            <div class="hamburger">
                <i class="fa-solid fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Cart Section -->
    <div class="cart-container">
        <div class="cart-header">
            <h2>Your Shopping Cart</h2>
            
            <p>Total Items: <span id="cartTotalItems">0</span></p>
            <button id="clearCartBtn" class="btn btn-outline" style="margin-left: auto; padding: 0.5rem 1rem;">
                <i class="fa-solid fa-trash-can"></i> Clear Cart
            </button>

        </div>
        
        <div class="cart-items" id="cartItemsContainer">
            <!-- Items injected by JS -->
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-col">
                <h3>Wishes&Cards</h3>
                <p>Delivering smiles and heartfelt emotions through beautifully crafted greeting cards.</p>
            </div>
            <div class="footer-col">
                <h3>Quick Links</h3>
                <ul style="color: var(--text-light); line-height: 2;">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="cards.html">Cards</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Wishes&Cards Platform. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
